<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Speed Test</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>

    <main class="container">
        <header class="header">
            <h1>⌨️ Typing Speed Test</h1>
            <p class="subtitle">Test how fast and accurately you can type</p>
        </header>

        <section class="stats-bar">
            <div class="stat-box">
                <span class="stat-value" id="timeValue">60</span>
                <span class="stat-label">Seconds</span>
            </div>
            <div class="stat-box">
                <span class="stat-value" id="wpmValue">0</span>
                <span class="stat-label">WPM</span>
            </div>
            <div class="stat-box">
                <span class="stat-value" id="accuracyValue">100%</span>
                <span class="stat-label">Accuracy</span>
            </div>
            <div class="stat-box">
                <span class="stat-value" id="errorsValue">0</span>
                <span class="stat-label">Errors</span>
            </div>
        </section>

        <section class="text-display" id="textDisplay" aria-live="polite">
            <!-- words injected by JS -->
        </section>

        <textarea id="inputArea" class="input-area" placeholder="Click here and start typing to begin the test..."
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>

        <div class="controls">
            <select id="durationSelect" class="duration-select">
                <option value="15">15 seconds</option>
                <option value="30">30 seconds</option>
                <option value="60" selected>60 seconds</option>
                <option value="120">120 seconds</option>
            </select>
            <button id="restartBtn" class="btn-primary">🔄 Restart</button>
        </div>
    </main>

    <div class="modal-overlay" id="resultModal">
        <div class="modal-card">
            <h2>⏱️ Time's Up!</h2>
            <div class="result-grid">
                <div class="result-item">
                    <span class="result-value" id="finalWpm">0</span>
                    <span class="result-label">Words / Min</span>
                </div>
                <div class="result-item">
                    <span class="result-value" id="finalAccuracy">0%</span>
                    <span class="result-label">Accuracy</span>
                </div>
                <div class="result-item">
                    <span class="result-value" id="finalErrors">0</span>
                    <span class="result-label">Errors</span>
                </div>
                <div class="result-item">
                    <span class="result-value" id="finalChars">0</span>
                    <span class="result-label">Characters Typed</span>
                </div>
            </div>
            <button id="tryAgainBtn" class="btn-primary">Try Again</button>
        </div>
    </div>

    <footer class="footer">
        <p>Made with ❤️ for 62Days-CodeSprint-WebDev-Challenge</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
